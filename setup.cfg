[mypy]
#incremental = true
ignore_missing_imports = true

[flake8]
exclude = migrations, manage.py, get-pip.py, autodocs/source/conf.py, proto/
max-line-length = 120

[yapf]
COLUMN_LIMIT = 95
CONTINUATION_ALIGN_STYLE = VALIGN-RIGHT
# DEDENT_CLOSING_BRACKETS = true

[tool:pytest]
python_files=pytest_*.py test_*.py

